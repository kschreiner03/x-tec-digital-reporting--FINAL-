<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Install Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The exact Squirrel window size */
    .frame {
      width: 314px;
      height: 227px;
      background: #111518;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      flex-shrink: 0;
    }

    .logo {
      height: 44px;
      opacity: 0.93;
    }

    .subtitle {
      font-size: 11.5px;
      color: rgba(232, 234, 237, 0.45);
      letter-spacing: 0.3px;
    }

    .bar-wrap {
      width: 240px;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #007D8C, #00c0d4);
      border-radius: 99px;
      animation: fill 20s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes fill {
      0%   { width: 0%; }
      82%  { width: 100%; }
      91%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    .file-text {
      font-size: 9px;
      color: rgba(232, 234, 237, 0.28);
      letter-spacing: 0.2px;
      margin-top: 2px;
      height: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img class="logo" src="assets/xterra-white.png" alt="X-Terra" />
    <span class="subtitle">X-TES Digital Reporting</span>
    <div class="bar-wrap">
      <div class="bar"></div>
    </div>
    <span class="file-text" id="fileText">Initializing...</span>
  </div>

  <script>
    const files = [
      'Initializing...',
      'Installing app.asar...',
      'Extracting resources\\assets\\icon.ico',
      'Extracting resources\\assets\\xterra-white.png',
      'Installing electron.exe',
      'Extracting resources\\app.asar',
      'Installing ffmpeg.dll',
      'Extracting locales\\en-US.pak',
      'Installing d3dcompiler_47.dll',
      'Extracting resources\\assets\\fonts',
      'Installing vk_swiftshader.dll',
      'Extracting snapshot_blob.bin',
      'Installing chrome_100_percent.pak',
      'Extracting resources\\install.html',
      'Installing icudtl.dat',
      'Extracting locales\\fr.pak',
      'Installing LICENSES.chromium.html',
      'Creating desktop shortcut...',
      'Finalizing installation...',
    ];

    let i = 0;
    const el = document.getElementById('fileText');

    // Delays tuned so all files finish in ~10s (matching progress bar)
    // Slow start, fast middle burst, slow finish
    const delays = [
      2000, 1500,                                                                   // first 2 — slow (initializing)
      900, 730, 580, 480, 420, 370, 350, 330, 350, 370, 420, 480, 580, 730, 900,  // middle 15 — fast burst
      2500, 3000                                                                    // last 2 — slow (shortcuts, finalizing)
    ];

    function next() {
      el.textContent = files[i % files.length];
      const delay = delays[i % delays.length];
      i++;
      setTimeout(next, delay);
    }

    next();
  </script>
</body>
</html>
